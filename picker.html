<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="initial-scale=1.0">
<title>Picker</title>
<style>

html{
    height: 100%;
}

body {
    background:#FFF;
    color:#000;
    font-family:verdana, sans-serif;
    font-size:10pt;
    margin:0;
    padding:10px;
}

ul{
    width: 424px;
}

ol{
    width: 560px;
}

a:link, a:visited {
    color:#008;
    font-weight:bold;
    text-decoration:none;
}

a:active, a:hover {
    color:#ACF;
}

.info {
    font-weight:bold;
}

button {
    font-family:inherit;
    cursor:pointer;
    border:0;
    border-radius:3px;
    padding:0.3em 0.5em;
    background:#CCC;
    color:#000;
}

button:hover {
    background:#DDD;
}

button.disabled {
    background:#DDD;
    color:#888;
    cursor:not-allowed;
}

button.disabled:hover {
    background:#DDD;
}

#container {
    position:relative;
    margin-left:-10px;
    margin-right:-10px;
    padding:10px;
    overflow:hidden;
}


#pick {
    background:#58F;
    color:#FFF;
    font-size:larger;
    font-weight:bold;
    width:6em;
    border-radius:5px;
    margin-right:10px;
}

#pick.disabled {
    background:#ACF;
}

#pick:hover {
    background:#ACF;
}

.item-list {
    padding:0;
    list-style-type:none;
    line-height:100px;
}

.item-list li {
    margin:0;
    display:inline-block;
    height:100px;
    width:100px;
    line-height:100px;
    border:3px solid transparent;
    text-align:center;
    position:relative;
    vertical-align:top;
    overflow:hidden;
    border-radius:100%;
    background:#224466;
    color:#000;
}

.item-list li img {
    vertical-align:center;
    max-height:100%;
    max-width:100%;
}

.item-list li span {
    display:inline-block;
    vertical-align:middle;
    line-height:1.2;
}

@media (max-width:636px) {
    .item-list {
        line-height:75px;
    }

    .item-list li {
        line-height:75px;
        height:75px;
        width:75px;
    }
}

@media (max-width:423px) {
    .item-list {
        line-height:50px;
    }

    .item-list li {
        line-height:50px;
        height:50px;
        width:50px;
    }
}

#evaluating li {
    cursor:pointer;
}

#favorites li {
    cursor:move;
}

.item-list li:hover {
    background:#c9d6e4;
}

.item-list.sorting li:hover {
    background:#335577;
}

#evaluating li.selected {
    border:3px solid #7AC;
}

#evaluating, #buttons {
    text-align:center;
    margin:auto;
}

#evaluating li.notice {
    width:auto;
    height:auto;
    max-width:260px;
    margin:auto;
    background:#F7F7F7;
    border-radius:10px;
    padding:30px 30px;
    color:#000;
    text-align:center;
    line-height:1.4;
    cursor:auto;
    font-size:10pt;
}



#buttons {
    margin-top:30px;
    position:relative;
    z-index:3;
}

#darkmode-button{
    float: right;
}

#container{
    height: 600px;
    width: 100%;
    display: flex;
    flex-direction: row;
    justify-content: space-evenly;
    align-items: center;
    gap: 0px;
    flex: 1 1 auto;
}

#overAll{
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
}

#picking{
    width: auto;
    transform: scale(1.1);
}

#secondary{
    max-width: 800px;
    display: flex;
    flex-direction: column;
    align-self: center;
    align-items: center;
}

#big-image-popup {
    
    border: 4px solid #224466;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    pointer-events: none;
}


#big-image-popup img {
    width: 400px;
    display: block;
}


body.dark-mode{
    background:#001122;
    color:#CDD;
}

.dark-mode{
    h1, .info {
        color:#FFF;
    }

    a:link, a:visited {
        color:#AEF;
    }

    a:active, a:hover {
        color:#FFF;
    }

    button {
        background:#224466;
        color:#FFF;
    }

    button:hover, button:active, button:focus, button.disabled:hover {
        background:#335577;
    }

    button.disabled {
        background:#335577;
        color:#88AACC;
    }

    .tabs {
        border-bottom-color:#335577;
    }

    .tabs li {
        border-color:#335577;
        background:#224466;
    }

    .tabs li.active {
        background:#335577;
        border-bottom-color:#335577;
    }

    .tabs a {
        color:#FFF;
    }

    #picking .backdrop {
        background:rgba(0, 17, 34, 0.9);
    }

    #picking .backdrop .notice {
        background:#113355;
        color:#FFF;
    }

    #pick {
        background:#3388AA;
    }

    #pick.disabled {
        background:#55AACC;
    }

    #pick:hover {
        background:#55AACC;
    }

    .item-list li {
        color:#224466;
    }

    .item-list li span {
        background:#112244;
    }

    .item-list li:hover span {
        background:#335577;
    }

    .item-list.sorting li:hover span {
        background:#112244;
    }

    #pokemon li.selected span {
        border-color:#AEF;
    }

    #pokemon li.notice {
        background:#113355;
        color:#FFF;
    }

    #progress-bar {
        background:#224466;
    }

    #progress-bar span {
        background:#AEF;
    }

    #shared-list-modal {
        background:#001233;
    }

    #shared-list-modal:before {
        background:#000;
    }
}

</style>
</head>

    var myPicker = new picker.Picker({
        items: items,
        localStorageKey: 'picker-state',
        defaultSettings: {
            minBatchSize: 2,
            maxBatchSize: 16,
        }
    });

    var pickerUI = new PickerUI(myPicker, {
        elements: {
            pick: "#pick",
            pass: "#pass",
            undo: "#undo",
            redo: "#redo",
            evaluating: "#evaluating",
            favorites: "#favorites"
        }
    });

    pickerUI.initialize();

    /* Sortable favorites - you can safely remove this, and the Sortable.min.js script, if you don't want to be able to sort your favorite list. */
    var sortable = new Sortable(pickerUI.elem.favorites.get(0), {
        draggable: '.item',
        animation: 100,
        onStart: function() {
            pickerUI.elem.favorites.addClass("sorting");
        },
        onEnd: function() {
            pickerUI.elem.favorites.removeClass("sorting");
        },
        onUpdate: function() {
            myPicker.setFavorites(pickerUI.elem.favorites.children().map(function() {
                return pickerUI.getItem(this);
            }).get());
            pickerUI.update(true);
        }
    });
    /* End sortable favorites */

    function toggleMode() {
        let buttonText = document.getElementById("darkmode-button");
        var element = document.body;
        if (buttonText.innerHTML === 'Dark mode') {
        element.classList.add("dark-mode");
        document.getElementById("darkmode-button").innerHTML = 'Light mode';
        }
        else
        {
        element.classList.remove("dark-mode");
        document.getElementById("darkmode-button").innerHTML = 'Dark mode';
        }
    }

    const popup = document.getElementById('big-image-popup');
    const popupImg = document.getElementById('popup-img');

    function bigImage(name){
        popupImg.src = "images/Fulls/" + name + " Full.png";
        popup.style.display = 'block';
        const x = event.pageX + 20; 
        const y = event.pageY - 200;

        popup.style.left = `${x}px`;
        popup.style.top = `${y}px`;
    }

    function hideBigImage(){
        popup.style.display = 'none';
        popupImg.src = '';
    }
